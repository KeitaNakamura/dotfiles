set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'KeitaNakamura/tmux-colors-railscasts-earthtone'

# keybind {{{

# prefixキーを変更する
set -g prefix 'C-g'

# C-bのキーバインドを解除する
unbind C-b

# キーストロークのディレイを減らす
set -s escape-time 0

# ペインのインデックスを1から始める
setw -g pane-base-index 1

# Prefix+- で横に、Prefix+| で縦に分割（ペイン）する
# bind-key | split-window -h
# bind-key - split-window -v
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Prefix + Ctrl-h/l でウィンドウ切り替え
# Prefix + Ctrl-h,h,h,h,...と連打できる
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# Prefix+hjkl でペイン移動
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# ペインサイズを上下左右（Prefix+JKHL）に変更
# Prefix+J,J,J,J,...と連打してリサイズ可能
bind-key -r H resize-pane -L 1
bind-key -r J resize-pane -D 1
bind-key -r K resize-pane -U 1
bind-key -r L resize-pane -R 1

# マウス操作を有効にする
setw -g mouse

# }}}
# status bar {{{

# ステータスバーをトップに配置する
set-option -g status-position top

# 左右のステータスバーの長さを決定する
set-option -g status-left-length 90
set-option -g status-right-length 90

# #H => マシン名
# #P => ペイン番号
# 最左に表示
set-option -g status-left '#H:[#P]'

# Wi-Fi、バッテリー残量、現在時刻
# 最右に表示
# set-option -g status-right '#[fg=colour15]#(wifi)#[default]  #(battery -t -m -r)  [%Y-%m-%d(%a) %H:%M]'
# set-option -g status-right '#[fg=colour15]#(wifi)#[default]  #(battery -t -r)  %a %H:%M'
set-option -g status-right '#[fg=colour15]#(wifi -r -s)#[default]   #(battery -t -r)  #(timerx +"%a %H:%M")'

# ステータスバーを Utf-8 に対応
set-option -g status-utf8 on

# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 1

# センタライズ（主にウィンドウ番号など）
set-option -g status-justify centre

# }}}

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
